<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>lively.next</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }
    .container {
      text-align: center;
    }
    h1 {
      font-size: 2.5rem;
      font-weight: 300;
      letter-spacing: 0.1em;
      margin-bottom: 2rem;
    }
    .status {
      font-size: 0.95rem;
      color: #888;
      margin-top: 1.5rem;
      min-height: 1.4em;
    }
    .spinner {
      width: 48px;
      height: 48px;
      border: 3px solid #333;
      border-top-color: #6c9bff;
      border-radius: 50%;
      margin: 0 auto;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>lively.next</h1>
    <div class="spinner"></div>
    <div class="status" id="status">Starting server...</div>
  </div>
  <script>
    // node-main communicates boot progress via nw.Window events
    if (typeof nw !== 'undefined') {
      const win = nw.Window.get();
      win.on('lively-boot-status', function (msg) {
        document.getElementById('status').textContent = msg;
      });
      win.on('lively-boot-error', function (msg) {
        document.getElementById('status').textContent = msg;
        document.getElementById('status').style.color = '#ff6b6b';
        document.querySelector('.spinner').style.display = 'none';
      });
      // Server-ready handoff: node-main emits the target URL and we navigate
      // from the DOM context. Setting location.href across the node↔DOM
      // boundary directly from node-main is flaky in NW.js — doing it here,
      // inside the page's own script, is the canonical pattern.
      win.on('lively-boot-navigate', function (url) {
        window.location.href = url;
      });
    }
  </script>
</body>
</html>
